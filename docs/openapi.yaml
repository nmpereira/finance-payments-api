openapi: 3.0.3
info:
  title: Finance Payments API
  description: |
    Partner-configurable financing eligibility rules and installment breakdown.
    See README.md, docs/reference.md (assumptions, examples), and docs/architecture.md.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  uptimeSeconds:
                    type: number

  /api/v1/finance/decision:
    post:
      summary: Evaluate financing decision for a partner
      operationId: postFinanceDecision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinanceDecisionRequest"
            examples:
              minimal:
                summary: Required fields only
                value:
                  partnerId: partner-123
                  amount: 1200
                  policy:
                    attributes: {}
              full:
                summary: With optional term and frequency
                value:
                  partnerId: partner-123
                  amount: 1200
                  termMonths: 12
                  paymentFrequency: MONTHLY
                  policy:
                    policyId: POL-001
                    attributes:
                      state: CA
                      businessType: hotel
      responses:
        "200":
          description: Decision result (financeable or denied by rules)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceDecisionResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceDecisionResponse"
        "404":
          description: Unknown partner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceDecisionResponse"
        "500":
          description: Server error

  /api/v1/partners:
    get:
      summary: List all partner rule sets
      operationId: listPartners
      responses:
        "200":
          description: Array of partner rule sets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PartnerRuleSet"

  /api/v1/partners/{partnerId}/rules:
    parameters:
      - name: partnerId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get one partner rule set
      operationId: getPartnerRules
      responses:
        "200":
          description: Partner rule set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerRuleSet"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    put:
      summary: Create or replace partner rule set
      operationId: putPartnerRules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerRuleSetUpsert"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  partnerId:
                    type: string
        "400":
          description: Invalid body
    delete:
      summary: Delete partner rule set
      operationId: deletePartnerRules
      responses:
        "204":
          description: Deleted

components:
  schemas:
    FinanceDecisionRequest:
      type: object
      required:
        - partnerId
        - amount
        - policy
      properties:
        partnerId:
          type: string
        amount:
          type: number
        termMonths:
          type: number
        paymentFrequency:
          type: string
          enum: [MONTHLY, QUARTERLY, ANNUALLY]
        policy:
          type: object
          required:
            - attributes
          properties:
            policyId:
              type: string
            attributes:
              type: object
              additionalProperties: true

    EvaluationError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    InstallmentPayment:
      type: object
      properties:
        sequence:
          type: integer
        amount:
          type: number

    InstallmentPlan:
      type: object
      properties:
        termMonths:
          type: integer
        paymentFrequency:
          type: string
          enum: [MONTHLY, QUARTERLY, ANNUALLY]
        numberOfPayments:
          type: integer
        payments:
          type: array
          items:
            $ref: "#/components/schemas/InstallmentPayment"

    FinanceDecisionResponse:
      type: object
      properties:
        financeable:
          type: boolean
        errors:
          type: array
          items:
            $ref: "#/components/schemas/EvaluationError"
        installments:
          $ref: "#/components/schemas/InstallmentPlan"

    RuleCondition:
      type: object
      properties:
        field:
          type: string
          description: e.g. amount, policy.attributes.state
        operator:
          type: string
          enum: [EQ, NE, GT, GTE, LT, LTE, IN, NOT_IN]
        op:
          type: string
          description: Alias for operator
        value: {}

    Rule:
      type: object
      required:
        - id
        - description
        - when
        - effect
      properties:
        id:
          type: string
        description:
          type: string
        when:
          type: array
          items:
            $ref: "#/components/schemas/RuleCondition"
        effect:
          type: string
          enum: [DENY]
        errorCode:
          type: string
        errorMessage:
          type: string

    PartnerRuleSetDefaults:
      type: object
      properties:
        termMonths:
          type: integer
        paymentFrequency:
          type: string
          enum: [MONTHLY, QUARTERLY, ANNUALLY]

    PartnerRuleSet:
      type: object
      required:
        - partnerId
        - rules
      properties:
        partnerId:
          type: string
        defaults:
          $ref: "#/components/schemas/PartnerRuleSetDefaults"
        rules:
          type: array
          items:
            $ref: "#/components/schemas/Rule"

    PartnerRuleSetUpsert:
      type: object
      required:
        - rules
      properties:
        defaults:
          $ref: "#/components/schemas/PartnerRuleSetDefaults"
        rules:
          type: array
          items:
            $ref: "#/components/schemas/Rule"
